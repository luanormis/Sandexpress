steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--tag', 'gcr.io/$PROJECT_ID/sandexpress-prod:$COMMIT_SHA',
           '--build-arg', 'NEXT_PUBLIC_ENV=production',
           '--build-arg', 'NEXT_PUBLIC_SUPABASE_URL=${_SUPABASE_URL}',
           '--build-arg', 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY}',
           '--build-arg', 'NEXT_PUBLIC_APP_URL=${_APP_URL}', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sandexpress-prod:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: ['run', 'deploy', 'sandexpress-prod',
           '--image=gcr.io/$PROJECT_ID/sandexpress-prod:$COMMIT_SHA',
           '--region=us-central1', '--platform=managed', '--allow-unauthenticated',
           '--memory=1Gi', '--cpu=2', '--min-instances=1', '--max-instances=20',
           '--set-env-vars=NEXT_PUBLIC_ENV=production,NEXT_PUBLIC_SUPABASE_URL=${_SUPABASE_URL},NEXT_PUBLIC_SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY},NEXT_PUBLIC_APP_URL=${_APP_URL},SUPABASE_SERVICE_ROLE_KEY=${_SERVICE_ROLE_KEY},ADMIN_PASSWORD=${_ADMIN_PASSWORD},VENDOR_JWT_SECRET=${_VENDOR_JWT_SECRET}']
substitutions:
  _SUPABASE_URL: ''
  _SUPABASE_ANON_KEY: ''
  _APP_URL: ''
  _SERVICE_ROLE_KEY: ''
  _ADMIN_PASSWORD: ''
  _VENDOR_JWT_SECRET: ''
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
timeout: '1200s'
